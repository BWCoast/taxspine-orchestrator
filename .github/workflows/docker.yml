# .github/workflows/docker.yml
#
# Builds the taxspine-orchestrator Docker image and pushes it to the
# GitHub Container Registry (ghcr.io) on every push to main.
#
# The image is then available at:
#   ghcr.io/bwcoast/taxspine-orchestrator:latest
#   ghcr.io/bwcoast/taxspine-orchestrator:sha-<commit>
#
# Synology Container Manager pulls this image via docker-compose.synology.yml.
#
# ── SETUP (one-time) ──────────────────────────────────────────────────────────
# If tax-nor (the CLI source) is PUBLIC:
#   No setup needed. The workflow uses GITHUB_TOKEN automatically.
#
# If tax-nor is PRIVATE:
#   1. Create a GitHub Personal Access Token with "read:packages" + "repo" scope.
#   2. Go to taxspine-orchestrator repo → Settings → Secrets → Actions.
#   3. Add secret: GH_READ_TOKEN = <your PAT>
#   4. Uncomment the GH_READ_TOKEN build-arg below.
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from GitHub Actions UI.
  workflow_dispatch:

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # → bwcoast/taxspine-orchestrator

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Log in to GitHub Container Registry ────────────────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image tags ───────────────────────────────────────────────────
      # Produces:
      #   latest          (only on pushes to main, not PRs)
      #   sha-<short-sha> (every build)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      # ── Set up QEMU for multi-arch builds (optional) ────────────────────────
      # Uncomment if you need an ARM image for older Synology NAS.
      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@v3

      # ── Set up Docker Buildx ────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build and push ──────────────────────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # Push only on real commits to main; for PRs just build (no push).
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub's cache — speeds up subsequent builds.
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          # ── tax-nor auth (only needed if tax-nor is a private repo) ────────
          # Uncomment and add GH_READ_TOKEN secret if needed:
          # secrets: |
          #   gh_token=${{ secrets.GH_READ_TOKEN }}
          # Then switch Dockerfile RUN to the --mount=type=secret variant.

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Print image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "### Docker image pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/bwcoast/taxspine-orchestrator:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull on Synology:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/bwcoast/taxspine-orchestrator:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
